name: SkyHawk SHRP Builder (Branch + Report)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "SHRP Branch (current testing)"
        required: true
        default: "shrp-12.1"
        type: choice
        options:
          - shrp-12.1
          - shrp-9.0

      DEVICE_TREE_BRANCH:
        description: "Device tree branch (fijo: tus correcciones viven aquí)"
        required: true
        default: "android-14.1"
        type: choice
        options:
          - android-14.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEVICE_NAME: a35x
      DEVICE_MAKEFILE: omni_a35x
      DEVICE_TREE: https://github.com/christiandroid20/android_device_samsung_a35x.git

    steps:
      # =========================
      # INSTALL
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl python3 ccache bc bison build-essential \
            flex g++-multilib gcc-multilib libxml2-utils make \
            zip unzip rsync openjdk-11-jdk software-properties-common

          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt update
          sudo apt install -y python2.7

          sudo ln -sf /usr/bin/python3 /usr/bin/python || true

      # =========================
      # REPO TOOL
      # =========================
      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # =========================
      # INIT SHRP
      # =========================
      - name: Init SHRP
        run: |
          mkdir android-recovery
          cd android-recovery

          repo init -u https://github.com/SHRP-Reborn/manifest.git -b ${{ inputs.MANIFEST_BRANCH }}

      # =========================
      # SYNC
      # =========================
      - name: Sync source
        run: |
          cd android-recovery

          repo sync -c --no-tags --no-clone-bundle --force-sync -j4 || \
          repo sync -c --no-tags --no-clone-bundle -j2

      # =========================
      # DEVICE TREE (BRANCH FIJO: android-14.1)
      # =========================
      - name: Clone device tree
        run: |
          cd android-recovery

          git clone -b ${{ inputs.DEVICE_TREE_BRANCH }} $DEVICE_TREE device/samsung/$DEVICE_NAME

      # =========================
      # FIX COMMON ERROR
      # =========================
      - name: Fix recovery root
        run: |
          cd android-recovery

          mkdir -p device/samsung/$DEVICE_NAME/recovery/root || true

      # =========================
      # BUILD
      # =========================
      - name: Build recovery
        run: |
          cd android-recovery

          source build/envsetup.sh
          lunch $DEVICE_MAKEFILE-eng || lunch omni_a35x-eng
          mka recoveryimage -j$(nproc --all)

      # =========================
      # FIX PERMISSIONS
      # =========================
      - name: Fix permissions before packaging
        if: always()
        run: |
          cd android-recovery
          sudo chmod -R a+rX out/target/product/$DEVICE_NAME || true

      # =========================
      # OUTPUT REPORT
      # =========================
      - name: Build Report
        if: always()
        run: |
          cd android-recovery

          echo "==============================="
          echo "📊 BUILD REPORT"
          echo "==============================="
          echo "Device: $DEVICE_NAME"
          echo "Device tree branch: ${{ inputs.DEVICE_TREE_BRANCH }}"
          echo "Manifest branch: ${{ inputs.MANIFEST_BRANCH }}"
          echo "Status files:"

          ls -la out/target/product/$DEVICE_NAME/*.img out/target/product/$DEVICE_NAME/*.zip 2>/dev/null || echo "No se encontraron .img o .zip"

          echo "==============================="

      # =========================
      # SET TAG NAME
      # =========================
      - name: Set release tag
        if: always()
        run: echo "RELEASE_TAG=SHRP-${{ inputs.MANIFEST_BRANCH }}-${{ inputs.DEVICE_TREE_BRANCH }}-${{ github.run_number }}" >> $GITHUB_ENV

      # =========================
      # PUBLISH TO RELEASES
      # =========================
      - name: Publish to GitHub Releases
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: SHRP ${{ inputs.MANIFEST_BRANCH }} - ${{ inputs.DEVICE_TREE_BRANCH }} (build #${{ github.run_number }})
          body: |
            Build automático de SHRP para Samsung A35x (SM-A356E)
            - Manifest branch: ${{ inputs.MANIFEST_BRANCH }}
            - Device tree branch: ${{ inputs.DEVICE_TREE_BRANCH }}
          files: |
            android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.img
            android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.zip
