name: Recovery Builder PRO (PERFECT MAINTAINER FIX)

on:
  workflow_dispatch:
    inputs:
      recovery:
        description: "Select recovery"
        required: true
        type: choice
        options:
          - twrp
          - shrp
          - orangefox

      device:
        description: "Device codename"
        required: true
        type: string

      device_tree:
        description: "Device tree URL"
        required: true
        type: string

      branch:
        description: "Device tree branch"
        required: false
        type: string
        default: "android-12.1"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      USE_CCACHE: 1
      CCACHE_DIR: ${{ github.workspace }}/ccache

    steps:
      - name: UI HEADER
        run: |
          echo "====================================="
          echo "🚀 RECOVERY BUILDER MAINTAINER"
          echo "====================================="
          echo "Recovery: ${{ inputs.recovery }}"
          echo "Device: ${{ inputs.device }}"
          echo "====================================="

      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 🔥 DEPENDENCIES FIXED
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            gcc-multilib g++-multilib libc6-dev-i386 \
            libncurses-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            unzip ccache python3

          # fix python2 legacy builds
          sudo ln -sf /usr/bin/python3 /usr/bin/python || true

      # =========================
      # 🔥 REPO TOOL
      # =========================
      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # =========================
      # 🔥 INIT SOURCE
      # =========================
      - name: Init source
        run: |
          mkdir -p workspace
          cd workspace

          if [ "${{ inputs.recovery }}" = "twrp" ]; then
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1

          elif [ "${{ inputs.recovery }}" = "shrp" ]; then
            repo init -u https://github.com/SHRP-Reborn/manifest.git -b shrp-12.1

          else
            mkdir -p ~/OrangeFox_sync
            cd ~/OrangeFox_sync

            git clone https://gitlab.com/OrangeFox/sync.git
            cd sync

            ./orangefox_sync.sh --branch 12.1 --path $GITHUB_WORKSPACE/workspace

            cd $GITHUB_WORKSPACE/workspace
          fi

      # =========================
      # 🔥 SAFE SYNC
      # =========================
      - name: Sync source
        run: |
          cd workspace

          if [ "${{ inputs.recovery }}" != "orangefox" ]; then
            repo sync -c -j4 --force-sync --no-clone-bundle --no-tags \
              || repo sync -c -j2 --force-sync --no-clone-bundle --no-tags
          fi

      # =========================
      # 🔥 DEVICE TREE
      # =========================
      - name: Clone device tree
        run: |
          cd workspace
          git clone ${{ inputs.device_tree }} device/${{ inputs.device }} \
            -b ${{ inputs.branch }} || true

      # =========================
      # 🔥 CRITICAL FIX (TU ERROR REAL)
      # =========================
      - name: Fix recovery root missing
        run: |
          cd workspace

          echo "🧠 Fixing missing recovery/root structure..."

          mkdir -p device/samsung/${{ inputs.device }}/recovery/root || true

          # evita fallos SHRP por root path inexistente
          mkdir -p device/${{ inputs.device }}/recovery/root || true

      # =========================
      # 🔥 BUILD
      # =========================
      - name: Build recovery
        run: |
          cd workspace

          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          export TW_DEFAULT_LANGUAGE=en

          source build/envsetup.sh

          if [ "${{ inputs.recovery }}" = "twrp" ]; then
            lunch twrp_${{ inputs.device }}-eng || lunch omni_${{ inputs.device }}-eng
            build/soong/soong_ui.bash --make-mode recoveryimage -j$(nproc --all)

          elif [ "${{ inputs.recovery }}" = "shrp" ]; then
            lunch omni_${{ inputs.device }}-eng
            build/soong/soong_ui.bash --make-mode recoveryimage -j$(nproc --all)

          else
            echo "🔥 OrangeFox build"
            lunch omni_${{ inputs.device }}-eng || true
            m bacon -j$(nproc --all) || true
          fi

      # =========================
      # 🔥 OUTPUT SAFE
      # =========================
      - name: Collect output
        if: always()
        run: |
          cd workspace
          mkdir -p release

          find out/target/product -type f \( -name "*.img" -o -name "*.zip" \) -exec cp {} release/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.recovery }}-${{ inputs.device }}
          path: workspace/release/*
