name: Recovery Builder PRO (Latest Upstream + Android 14.1 DT)

on:
  workflow_dispatch:
    inputs:
      recovery:
        description: "Select recovery"
        required: true
        type: choice
        options:
          - twrp
          - shrp
          - orangefox

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEVICE: a35x
      DEVICE_TREE: https://github.com/christiandroid20/android_device_samsung_a35x.git
      DEVICE_BRANCH: android-14.1

      USE_CCACHE: 1
      CCACHE_DIR: ${{ github.workspace }}/ccache

    steps:
      - name: Header
        run: |
          echo "====================================="
          echo "🚀 LATEST RECOVERY BUILDER"
          echo "Device: $DEVICE"
          echo "Device branch: $DEVICE_BRANCH"
          echo "Recovery: ${{ inputs.recovery }}"
          echo "====================================="

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            gcc-multilib g++-multilib libc6-dev-i386 \
            libncurses-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            unzip ccache python3

          sudo ln -sf /usr/bin/python3 /usr/bin/python || true

      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # =========================
      # INIT (LATEST UPSTREAM)
      # =========================
      - name: Init source
        run: |
          mkdir -p workspace
          cd workspace

          if [ "${{ inputs.recovery }}" = "twrp" ]; then
            echo "🔥 TWRP latest upstream"
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b main || \
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-14.1 || \
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b android-14.1

          elif [ "${{ inputs.recovery }}" = "shrp" ]; then
            echo "🔥 SHRP latest upstream"
            repo init -u https://github.com/SHRP-Reborn/manifest.git -b main || \
            repo init -u https://github.com/SHRP-Reborn/manifest.git -b shrp-14.1 || \
            repo init -u https://github.com/SHRP-Reborn/manifest.git -b android-14.1

          else
            echo "🔥 OrangeFox latest upstream"
            mkdir -p ~/OrangeFox_sync
            cd ~/OrangeFox_sync

            git clone https://gitlab.com/OrangeFox/sync.git
            cd sync

            ./orangefox_sync.sh --branch 14.1 --path $GITHUB_WORKSPACE/workspace

            cd $GITHUB_WORKSPACE/workspace
          fi

      # =========================
      # SYNC
      # =========================
      - name: Sync source
        run: |
          cd workspace
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags || true

      # =========================
      # DEVICE TREE (14.1)
      # =========================
      - name: Device tree
        run: |
          cd workspace

          git clone $DEVICE_TREE device/$DEVICE -b $DEVICE_BRANCH || true

      # =========================
      # FIX ROOT ISSUE
      # =========================
      - name: Fix recovery root
        run: |
          cd workspace
          mkdir -p device/samsung/$DEVICE/recovery/root || true
          mkdir -p device/$DEVICE/recovery/root || true

      # =========================
      # BUILD
      # =========================
      - name: Build recovery
        run: |
          cd workspace

          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          export TW_DEFAULT_LANGUAGE=en

          source build/envsetup.sh

          if [ "${{ inputs.recovery }}" = "twrp" ]; then
            lunch twrp_$DEVICE-eng || lunch omni_$DEVICE-eng
            build/soong/soong_ui.bash --make-mode recoveryimage -j$(nproc --all)

          elif [ "${{ inputs.recovery }}" = "shrp" ]; then
            lunch omni_$DEVICE-eng
            build/soong/soong_ui.bash --make-mode recoveryimage -j$(nproc --all)

          else
            lunch omni_$DEVICE-eng || true
            m bacon -j$(nproc --all) || true
          fi

      # =========================
      # OUTPUT
      # =========================
      - name: Collect output
        if: always()
        run: |
          cd workspace
          mkdir -p release
          find out/target/product -type f \( -name "*.img" -o -name "*.zip" \) -exec cp {} release/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.recovery }}-$DEVICE-14.1
          path: workspace/release/*
