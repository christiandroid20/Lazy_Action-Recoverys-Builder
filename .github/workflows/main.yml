name: Build Recoveries

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Select device model to build'
        required: false
        type: choice
        options:
          - 'All models'
          - 'SM-A546B'
          - 'SM-A356E'
          - 'SM-A546U'
          - 'SM-A546U1'
          - 'SM-A546S'
          - 'SM-A546W'
          - 'SM-A5460'
          - 'SM-A546V'
        default: 'All models'

      products:
        description: 'Select products to build'
        required: false
        type: choice
        options:
          - 'All products'
          - 'TWRP'
          - 'PBRP'
          - 'SHRP'
          - 'OrangeFox'
        default: 'All products'

      clean_build:
        description: 'Clean build'
        required: false
        type: boolean
        default: false


permissions:
  contents: write


env:
  DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git
  SHRP_MANIFEST: https://github.com/SHRP-Reborn/manifest.git


jobs:

  setup:
    name: Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set
        run: |
          if [ "${{ github.event.inputs.products }}" == "All products" ]; then
            echo 'matrix=["SHRP"]' >> $GITHUB_OUTPUT
          else
            echo "matrix=[\"${{ github.event.inputs.products }}\"]" >> $GITHUB_OUTPUT
          fi


  build_shrp:
    name: Build SHRP Recovery
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Free space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git aria2 ccache

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Prepare folders
        run: |
          mkdir -p $HOME/shrp
          mkdir -p $HOME/out

      - name: Init source
        run: |
          cd $HOME/shrp
          repo init -u $SHRP_MANIFEST -b shrp-12.1

      - name: Sync source
        run: |
          cd $HOME/shrp
          repo sync -c -j$(nproc) --force-sync

      - name: Clone device tree
        run: |
          cd $HOME/shrp
          git clone --depth=1 ${{ env.DEVICE_TREE_URL }} device/samsung/a35x

      - name: Build
        run: |
          cd $HOME/shrp
          source build/envsetup.sh
          lunch omni_a35x-eng
          mka recoveryimage -j$(nproc)

      - name: Package
        run: |
          cd $HOME/shrp/out/target/product/a35x
          tar -cf SHRP.tar recovery.img
          mv SHRP.tar $HOME/out/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/runner/out/SHRP.tar
          name: "SHRP Build"
          tag_name: "shrp-${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
