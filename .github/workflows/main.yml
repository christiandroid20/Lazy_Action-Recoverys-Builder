name: Recovery Builder PRO Stable

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

# =========================================================
# ⚡ SYSTEM BASE (SIN PAQUETES ROTOS)
# =========================================================
      - name: Install base dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git curl aria2 ccache bc bison build-essential \
            libncurses-dev libssl-dev libreadline-dev \
            libxml2-utils zip unzip python3 python3-pip

# =========================================================
# 🐍 PYTHON FIX ULTRA ESTABLE (NO PYTHON2 REAL NECESARIO)
# =========================================================
      - name: Python compatibility layer (FIX REAL)
        run: |
          # SHRP/TWRP solo necesita "python2.7" callable
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          sudo ln -sf /usr/bin/python3 /usr/bin/python2
          sudo ln -sf /usr/bin/python3 /usr/bin/python2.7

          python --version

# =========================================================
# ⚡ REPO TOOL
# =========================================================
      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

# =========================================================
# ⚡ INIT SOURCE (SHALLOW + SAFE)
# =========================================================
      - name: Init source
        run: |
          mkdir shrp
          cd shrp

          repo init -u https://github.com/SHRP-Reborn/manifest.git -b shrp-12.1

# =========================================================
# ⚡ SYNC STABLE (ANTI FREEZE)
# =========================================================
      - name: Sync source
        run: |
          cd shrp

          repo sync -c \
            --force-sync \
            --no-tags \
            --no-clone-bundle \
            -j4

# =========================================================
# 📱 DEVICE TREE
# =========================================================
      - name: Clone device tree
        run: |
          cd shrp
          git clone --depth=1 $DEVICE_TREE_URL device/samsung/a35x

# =========================================================
# ⚡ CCACHE (SPEED BOOST REAL)
# =========================================================
      - name: Setup ccache
        run: |
          export USE_CCACHE=1
          export CCACHE_DIR=$HOME/.ccache
          ccache -M 12G
          ccache -z

# =========================================================
# 🧠 BUILD
# =========================================================
      - name: Build recovery
        run: |
          cd shrp

          source build/envsetup.sh
          lunch omni_a35x-eng

          export ALLOW_MISSING_DEPENDENCIES=true

          mka recoveryimage -j$(nproc --all)

# =========================================================
# 📦 PACKAGE SAFE
# =========================================================
      - name: Package output
        run: |
          cd shrp/out/target/product/a35x

          if [ ! -f recovery.img ]; then
            echo "ERROR: recovery.img not found"
            exit 1
          fi

          tar -cf recovery.tar recovery.img
          mv recovery.tar $GITHUB_WORKSPACE/

# =========================================================
# 🚀 RELEASE SAFE (NO 403 ERRORS)
# =========================================================
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: recovery.tar
          tag_name: build-${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
