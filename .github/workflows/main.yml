name: Build Recoveries

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Select device model to build'
        required: false
        type: choice
        options:
          - 'All models'
          - 'SM-A546B'
          - 'SM-A356E'
          - 'SM-A546U'
          - 'SM-A546U1'
          - 'SM-A546S'
          - 'SM-A546W'
          - 'SM-A5460'
          - 'SM-A546V'
        default: 'All models'
      products:
        description: 'Select products to build'
        required: false
        type: choice
        options:
          - 'All products'
          - 'TWRP'
          - 'PBRP'
          - 'SHRP'
          - 'OrangeFox'
        default: 'All products'
      clean_build:
        description: 'Clean build'
        required: false
        type: boolean
        default: false

env:
  DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git
  TWRP_MANIFEST: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  PBRP_MANIFEST: https://github.com/PitchBlackRecoveryProject/manifest_pb.git
  SHRP_MANIFEST: https://github.com/SHRP-Reborn/manifest.git
  ORANGEFOX_MANIFEST: https://gitlab.com/OrangeFox/sync.git

jobs:
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.products }}" == "All products" ]; then
            echo 'matrix=["TWRP", "PBRP", "SHRP", "OrangeFox"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.products }}"]' >> $GITHUB_OUTPUT
          fi

  notify_workflow:
    name: Notify Build Start
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F message_thread_id="${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}" \
            -F text="
            🚀 Build started for Recovery! 
            📦 *Repository:* [${{ github.repository }}](https://github.com/${{ github.repository }})
            🗂️ *Products:* ${{ github.event.inputs.products }}
            🎯 *Target:* ${{ github.event.inputs.target }}
            ✏️ *Commit:* [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            [🔗 View GitHub Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            -F parse_mode="Markdown"

  build_twrp:
    name: Build TWRP
    needs: [setup, notify_workflow]
    runs-on: ubuntu-latest
    timeout-minutes: 480
    if: ${{ contains(needs.setup.outputs.matrix, 'TWRP') }}
    
    strategy:
      fail-fast: false
      matrix:
        target: ${{ github.event.inputs.target == 'All models' && fromJson('["SM-A546B", "SM-A546E", "SM-A546U", "SM-A546U1", "SM-A546S", "SM-A546W", "SM-A5460", "SM-A546V"]') || fromJson(format('["{0}"]', github.event.inputs.target || 'SM-A546B')) }}
        
    steps:          
      - name: Free up system space
        uses: rokibhasansagar/slimhub_actions@main
        
      - name: Checkout device tree
        uses: actions/checkout@v4
        
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set build variables
        run: |
          echo "TARGET_DEVICE=${{ matrix.target }}" >> $GITHUB_ENV
          echo "RECOVERY_TYPE=TWRP" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl --retry 3 --retry-delay 5 -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git aria2 ccache

          git clone --depth=1 https://gitlab.com/OrangeFox/misc/scripts ~/scripts
          cd ~/scripts
          sudo bash setup/android_build_env.sh
          sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
          sudo bash setup/install_android_sdk.sh

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git config --global color.ui true
      
      - name: Make directories
        run: |
          mkdir -p $HOME/twrp-12.1
          mkdir -p $HOME/twrp-build
          mkdir -p $HOME/files

      - name: Prepare device-specific files
        run: |
          curl --retry 3 --retry-delay 5 -o ~/bin/magiskboot https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Tools/magiskboot
          chmod +x ~/bin/magiskboot
          sudo ln -sf ~/bin/magiskboot /usr/bin/magiskboot
          curl --retry 5 --retry-delay 5 -o ~/twrp-build/recovery-${{ matrix.target }}.img https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Imagens/${{ matrix.target }}/recovery.img

      - name: Initialize TWRP source
        run: |
          cd $HOME/twrp-12.1
          repo init -u $TWRP_MANIFEST -b twrp-12.1 --depth=1
      
      - name: Sync TWRP source
        run: |
          cd $HOME/twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Clone device tree
        run: |
          cd $HOME/twrp-12.1
          git clone --depth=1 --branch twrp-12.1 ${{ env.DEVICE_TREE_URL }} device/samsung/a54x

      - name: Setup ccache
        if: github.event.inputs.clean_build != 'true'
        run: |
          cd $HOME/twrp-12.1
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 8G
          ccache -z

      - name: Build TWRP Recovery
        run: |
          cd $HOME/twrp-12.1
          export ALLOW_MISSING_DEPENDENCIES=true
          export TW_DEFAULT_LANGUAGE="en"
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make clean
          fi
          source build/envsetup.sh
          lunch omni_a35x-eng
          mka recoveryimage -j$(nproc --all)
      
      - name: Package recovery image
        run: |
          cp $HOME/twrp-12.1/out/target/product/a54x/recovery.img $HOME/twrp-build/twrp.img
          cd $HOME/twrp-build
          magiskboot unpack twrp.img
          magiskboot repack recovery-${{ matrix.target }}.img recovery.img
          PACKAGE_NAME="TWRP-${{ matrix.target }}_${{ env.DATE }}.tar"
          tar cf "$PACKAGE_NAME" recovery.img
          cp TWRP* $HOME/files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/runner/files/TWRP*
          name: "TWRP Recovery - ${{ env.DATE }}"
          tag_name: "twrp-${{ env.DATE }}"
          body: |
            ### Features
            - Full touch interface
            - ADB support
            - MTP support
            - Decrypt data partition
            - Backup and restore
            - LichUI support
            
            ### Important Notes
            - **VBMeta Patched**: https://github.com/Vaz15k/proprietary_vendor_samsung_a54x/releases
            - Always backup your current recovery before flashing
            - Ensure you download the correct file for your device model
            ---
            <div align="center">
            <b>Special Thanks:</b><br>
            - <b>@Vaz15k</b> for device images and resources<br>
            - <b>@salvogiangri</b> for TWRP tree<br>
            - <b><a href="https://gitlab.com/OrangeFox">OrangeFox Team</a></b> for build scripts
            </div>
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_pbrp:
    name: Build PBRP
    needs: [setup, notify_workflow]
    runs-on: ubuntu-latest
    timeout-minutes: 480
    if: ${{ contains(needs.setup.outputs.matrix, 'PBRP') }}
    
    strategy:
      fail-fast: false
      matrix:
        target: ${{ github.event.inputs.target == 'All models' && fromJson('["SM-A546B", "SM-A546E", "SM-A546U", "SM-A546U1", "SM-A546S", "SM-A546W", "SM-A5460", "SM-A546V"]') || fromJson(format('["{0}"]', github.event.inputs.target || 'SM-A546B')) }}
        
    steps:          
      - name: Free up system space
        uses: rokibhasansagar/slimhub_actions@main
        
      - name: Checkout device tree
        uses: actions/checkout@v4
        
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
