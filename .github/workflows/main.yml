      - name: Configure swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set build variables
        run: |
          echo "TARGET_DEVICE=${{ matrix.target }}" >> $GITHUB_ENV
          echo "RECOVERY_TYPE=PBRP" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Install repo tool
        run: |
          echo "Installing Google repo tool..."
          mkdir -p ~/bin
          curl --retry 3 --retry-delay 5 -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo
          echo "Repo tool installed successfully"

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git aria2 ccache

          git clone --depth=1 https://gitlab.com/OrangeFox/misc/scripts ~/scripts
          cd ~/scripts
          sudo bash setup/android_build_env.sh
          sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
          sudo bash setup/install_android_sdk.sh

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global color.ui true

      - name: Make directories
        run: |
          mkdir -p $HOME/pbrp-12.1
          mkdir -p $HOME/pbrp-build
          mkdir -p $HOME/files

      - name: Prepare device-specific files
        run: |
          curl --retry 3 --retry-delay 5 -o ~/bin/magiskboot https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Tools/magiskboot
          chmod +x ~/bin/magiskboot
          sudo ln -sf ~/bin/magiskboot /usr/bin/magiskboot
          curl --retry 5 --retry-delay 5 -o ~/pbrp-build/recovery-${{ matrix.target }}.img https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Imagens/${{ matrix.target }}/recovery.img
          
      - name: Initialize PBRP source
        run: |
          cd $HOME/pbrp-12.1
          repo init -u $PBRP_MANIFEST -b android-12.1 --depth=1

      - name: Sync PBRP source
        run: |
          cd $HOME/pbrp-12.1
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Patching PBRP for MTP
        run: |
          cd $HOME/pbrp-12.1/bootable/recovery

          wget https://raw.githubusercontent.com/snowwolf725/Action-TWRP-Builder-Waffle/refs/heads/main/patch/003-fix-decrypt.patch
          git apply --whitespace=nowarn 003-fix-decrypt.patch

          cd ../../system/vold
          wget https://raw.githubusercontent.com/snowwolf725/Action-TWRP-Builder-Waffle/refs/heads/main/patch/003-fix-decrypt2.patch
          git apply --whitespace=nowarn 003-fix-decrypt2.patch

      - name: Clone device tree
        run: |
          cd $HOME/pbrp-12.1
          git clone --depth=1 --branch pbrp-12.1 ${{ env.DEVICE_TREE_URL }} device/samsung/a54x

      - name: Setup ccache
        if: github.event.inputs.clean_build != 'true'
        run: |
          cd $HOME/pbrp-12.1
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 8G
          ccache -z

      - name: Build PBRP Recovery
        run: |
          cd $HOME/pbrp-12.1
          export ALLOW_MISSING_DEPENDENCIES=true
          export TW_DEFAULT_LANGUAGE="en"
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make clean
          fi
          source build/envsetup.sh
          lunch pb_a54x-eng
          mka pbrp -j$(nproc --all)

      - name: Package recovery image
        run: |
          cp $HOME/pbrp-12.1/out/target/product/a54x/recovery.img $HOME/pbrp-build/pbrp.img
          cd $HOME/pbrp-build
          magiskboot unpack pbrp.img
          magiskboot repack recovery-${{ matrix.target }}.img recovery.img
          PACKAGE_NAME="PBRP-${{ matrix.target }}_${{ env.DATE }}.tar"
          tar cf "$PACKAGE_NAME" recovery.img
          cp PBRP* $HOME/files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/runner/files/PBRP*
          name: "PBRP Recovery - ${{ env.DATE }}"
          tag_name: "pbrp-${{ env.DATE }}"
          body: |
            ### Features
            - Full touch interface
            - ADB support
            - MTP support
            - Decrypt data partition
            - Backup and restore
            - LichUI support
            
            ### Important Notes
            - **VBMeta Patched**: https://github.com/Vaz15k/proprietary_vendor_samsung_a54x/releases
            - Always backup your current recovery before flashing
            - Ensure you download the correct file for your device model
            ---
            <div align="center">
            <b>Special Thanks:</b><br>
            - <b>@Vaz15k</b> for device images and resources<br>
            - <b>@salvogiangri</b> for TWRP tree<br>
            - <b><a href="https://gitlab.com/OrangeFox">OrangeFox Team</a></b> for build scripts
            </div>
          draft: false
