name: Recovery Builder PRO Stable

on:
workflow_dispatch:

permissions:
contents: write

env:
DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git

jobs:
build:
runs-on: ubuntu-latest

```
steps:

  - name: Free Disk Space
    run: |
      sudo rm -rf /usr/share/dotnet
      sudo rm -rf /usr/local/lib/android
      sudo rm -rf /opt/ghc
      sudo rm -rf /opt/hostedtoolcache

      docker system prune -af || true

      sudo apt-get clean
      sudo rm -rf /var/lib/apt/lists/*

      echo "=== DISK AFTER CLEANUP ==="
      df -h

  - name: Install base dependencies
    run: |
      sudo apt update

      sudo apt install -y \
        git curl aria2 ccache bc bison build-essential \
        libncurses-dev libssl-dev libreadline-dev \
        libxml2-utils zip unzip python3 python3-pip

  - name: Python compatibility layer
    run: |
      sudo ln -sf /usr/bin/python3 /usr/bin/python
      sudo ln -sf /usr/bin/python3 /usr/bin/python2
      sudo ln -sf /usr/bin/python3 /usr/bin/python2.7

  - name: Install repo
    run: |
      mkdir -p ~/bin
      curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
      chmod +x ~/bin/repo
      sudo ln -sf ~/bin/repo /usr/bin/repo

  - name: Init source
    run: |
      mkdir -p shrp
      cd shrp

      repo init \
        -u https://github.com/SHRP-Reborn/manifest.git \
        -b shrp-12.1

  - name: Sync source
    run: |
      cd shrp

      repo sync \
        -c \
        --force-sync \
        --no-tags \
        --no-clone-bundle \
        -j2

  - name: Clone device tree
    run: |
      cd shrp

      rm -rf device/samsung/a35x

      git clone \
        --depth=1 \
        $DEVICE_TREE_URL \
        device/samsung/a35x

  - name: Setup ccache
    run: |
      export USE_CCACHE=1
      export CCACHE_DIR=$HOME/.ccache

      ccache -M 8G
      ccache -z

  - name: Build recovery
    run: |
      cd shrp

      source build/envsetup.sh
      lunch omni_a35x-eng

      export ALLOW_MISSING_DEPENDENCIES=true
      export USE_CCACHE=1

      mka recoveryimage -j$(nproc)

  - name: Package output
    run: |
      cd shrp/out/target/product/a35x

      test -f recovery.img

      tar -cf recovery.tar recovery.img

      mv recovery.tar \
        $GITHUB_WORKSPACE/recovery.tar

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: recovery-a35x
      path: recovery.tar

  - name: Create release
    uses: softprops/action-gh-release@v2
    with:
      files: recovery.tar
      tag_name: build-${{ github.run_id }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
