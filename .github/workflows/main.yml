name: Recovery Builder PRO Stable

on:
workflow_dispatch:

permissions:
contents: write

env:
DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Free Disk Space
    run: |
      echo "Disk before cleanup:"
      df -h

      sudo rm -rf /usr/share/dotnet
      sudo rm -rf /usr/local/lib/android
      sudo rm -rf /opt/ghc
      sudo rm -rf /opt/hostedtoolcache

      docker system prune -af || true

      echo "Disk after cleanup:"
      df -h

  - name: Install base dependencies
    run: |
      sudo apt update

      sudo apt install -y \
        git curl aria2 ccache bc bison build-essential \
        libncurses-dev libssl-dev libreadline-dev \
        libxml2-utils zip unzip python3 python3-pip

  - name: Python compatibility layer
    run: |
      sudo ln -sf /usr/bin/python3 /usr/bin/python
      sudo ln -sf /usr/bin/python3 /usr/bin/python2
      sudo ln -sf /usr/bin/python3 /usr/bin/python2.7

      python --version

  - name: Install repo
    run: |
      mkdir -p ~/bin
      curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
      chmod +x ~/bin/repo
      sudo ln -sf ~/bin/repo /usr/bin/repo

  - name: Init source
    run: |
      mkdir -p shrp
      cd shrp

      repo init -u https://github.com/SHRP-Reborn/manifest.git -b shrp-12.1

  - name: Sync source
    run: |
      cd shrp

      repo sync -c \
        --force-sync \
        --no-tags \
        --no-clone-bundle \
        -j2
```
