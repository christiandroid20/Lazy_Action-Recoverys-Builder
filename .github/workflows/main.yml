name: Multi Recovery PRO SPEED

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git

jobs:

# =========================
# ⚡ SHRP FAST BUILD
# =========================
  shrp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # ⚡ CACHE REAL (GRAN MEJORA)
      # =========================
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-shrp-${{ runner.os }}

      # =========================
      # ⚡ DEPENDENCIAS MINIMAS (MAS RAPIDO)
      # =========================
      - name: Install deps fast
        run: |
          sudo apt update
          sudo apt install -y \
            git curl aria2 ccache bc bison build-essential \
            libncurses-dev libssl-dev \
            python3

      # =========================
      # 🐍 PYTHON2 SOLO SI SE NECESITA
      # =========================
      - name: Python2 fix (light)
        run: |
          cd /opt
          sudo curl -L -o py2.tar.gz \
          https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-2.7.18+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz

          sudo tar -xzf py2.tar.gz
          sudo mv python /opt/python2

          sudo ln -sf /opt/python2/bin/python2.7 /usr/bin/python2.7

      # =========================
      # ⚡ REPO TOOL
      # =========================
      - name: repo tool
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      # =========================
      # ⚡ INIT (SHALLOW + FAST)
      # =========================
      - name: Init SHRP
        run: |
          mkdir shrp && cd shrp
          repo init -u https://github.com/SHRP-Reborn/manifest.git -b shrp-12.1 --depth=1

      # =========================
      # ⚡ FAST SYNC (CLAVE DE VELOCIDAD)
      # =========================
      - name: Sync SHRP FAST
        run: |
          cd shrp
          repo sync -c \
            --force-sync \
            --no-tags \
            --no-clone-bundle \
            -j8

      # =========================
      # ⚡ DEVICE TREE
      # =========================
      - name: Device tree
        run: |
          cd shrp
          git clone --depth=1 $DEVICE_TREE_URL device/samsung/a35x

      # =========================
      # ⚡ BUILD (MAX SPEED)
      # =========================
      - name: Build SHRP FAST
        run: |
          cd shrp
          source build/envsetup.sh
          lunch omni_a35x-eng

          export ALLOW_MISSING_DEPENDENCIES=true
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache

          ccache -M 15G

          mka recoveryimage -j$(nproc --all)

      # =========================
      # 📦 PACKAGE LIGHT
      # =========================
      - name: Package
        run: |
          cd shrp/out/target/product/a35x
          tar -cf SHRP.tar recovery.img
          mv SHRP.tar $GITHUB_WORKSPACE/

      # =========================
      # 🚀 RELEASE FAST
      # =========================
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: SHRP.tar
          tag_name: shrp-${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
