name: SHRP Stable Builder

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git
  SHRP_MANIFEST: https://github.com/SHRP-Reborn/manifest.git

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 🔧 BASE SYSTEM
      # =========================
      - name: Free space
        run: |
          sudo apt update
          sudo apt install -y git curl aria2 ccache bc bison build-essential \
          ccache clang cmake flex g++ gcc git gnupg gperf imagemagick \
          lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool \
          libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
          lzop pngcrush rsync schedtool squashfs-tools xsltproc zip unzip \
          python3 python3-pip python-is-python3

      # =========================
      # 🐍 PYTHON 2.7 FIX (CRÍTICO)
      # =========================
      - name: Install Python 2.7 (FIX SHRP)
        run: |
          sudo apt update
          sudo apt install -y python2

          sudo ln -sf /usr/bin/python2 /usr/bin/python2.7
          sudo ln -sf /usr/bin/python2 /usr/bin/python

          python2.7 --version

      # =========================
      # 🔧 REPO TOOL
      # =========================
      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      # =========================
      # 📦 INIT SOURCE
      # =========================
      - name: Init SHRP
        run: |
          mkdir shrp && cd shrp
          repo init -u $SHRP_MANIFEST -b shrp-12.1 --depth=1

      # =========================
      # 🔄 SYNC (OPTIMIZADO)
      # =========================
      - name: Sync SHRP (stable)
        run: |
          cd shrp
          repo sync -c -j4 --force-sync --no-tags --no-clone-bundle

      # =========================
      # 📱 DEVICE TREE
      # =========================
      - name: Clone device tree
        run: |
          cd shrp
          git clone --depth=1 $DEVICE_TREE_URL device/samsung/a35x

      # =========================
      # 🧠 ENV BUILD
      # =========================
      - name: Build setup
        run: |
          cd shrp
          source build/envsetup.sh
          lunch omni_a35x-eng

      # =========================
      # 🏗️ BUILD
      # =========================
      - name: Build SHRP
        run: |
          cd shrp
          export ALLOW_MISSING_DEPENDENCIES=true
          mka recoveryimage -j$(nproc --all)

      # =========================
      # 📦 PACKAGING
      # =========================
      - name: Package recovery
        run: |
          cd shrp/out/target/product/a35x
          tar -cf SHRP.tar recovery.img
          mv SHRP.tar $GITHUB_WORKSPACE/

      # =========================
      # 🚀 RELEASE FIXED
      # =========================
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: SHRP.tar
          tag_name: shrp-${{ github.run_id }}
          name: SHRP Stable Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
