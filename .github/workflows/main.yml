name: SHRP Stable Build (Modern Fix)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  DEVICE_TREE_URL: https://github.com/christiandroid20/shrp_device_samsung_a35x.git
  SHRP_MANIFEST: https://github.com/SHRP-Reborn/manifest.git

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 🧹 SYSTEM SETUP (MODERN UBUNTU FIX)
      # =========================
      - name: Install dependencies (Ubuntu 22.04+ FIX)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update

          sudo apt install -y \
            git curl aria2 ccache bc bison build-essential \
            cmake flex g++ gcc git gnupg gperf imagemagick \
            libncurses-dev libreadline-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip unzip \
            python3 python3-pip python-is-python3 \
            libc6:i386 libstdc++6:i386 lib32z1

      # =========================
      # 🐍 PYTHON FIX (NO PY2 NEEDED EMULATION)
      # =========================
      - name: Python compatibility layer
        run: |
          python3 --version
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # =========================
      # 🔧 REPO TOOL
      # =========================
      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      # =========================
      # 📦 INIT SHRP
      # =========================
      - name: Init SHRP source
        run: |
          mkdir shrp && cd shrp
          repo init -u $SHRP_MANIFEST -b shrp-12.1 --depth=1

      # =========================
      # 🔄 SYNC (STABLE MODE)
      # =========================
      - name: Sync source (stable)
        run: |
          cd shrp
          repo sync -c -j4 --force-sync --no-tags --no-clone-bundle

      # =========================
      # 📱 DEVICE TREE
      # =========================
      - name: Clone device tree
        run: |
          cd shrp
          git clone --depth=1 $DEVICE_TREE_URL device/samsung/a35x

      # =========================
      # 🧠 BUILD ENV
      # =========================
      - name: Setup build environment
        run: |
          cd shrp
          source build/envsetup.sh
          lunch omni_a35x-eng

      # =========================
      # 🏗️ BUILD
      # =========================
      - name: Build SHRP
        run: |
          cd shrp
          export ALLOW_MISSING_DEPENDENCIES=true
          mka recoveryimage -j$(nproc --all)

      # =========================
      # 📦 PACKAGE
      # =========================
      - name: Package recovery
        run: |
          cd shrp/out/target/product/a35x
          tar -cf SHRP.tar recovery.img
          mv SHRP.tar $GITHUB_WORKSPACE/

      # =========================
      # 🚀 RELEASE FIXED
      # =========================
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: SHRP.tar
          tag_name: shrp-${{ github.run_id }}
          name: SHRP Stable Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
