      - name: Setup ccache
        if: github.event.inputs.clean_build != 'true'
        run: |
          cd $HOME/ofox-12.1
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 8G
          ccache -z

      - name: Build OrangeFox Recovery
        run: |
          set +e
          cd $HOME/ofox-12.1
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_DEVICE=a54x
          export LC_ALL="C"
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make clean
          fi
          source build/envsetup.sh
          set -e
          lunch twrp_a54x-eng
          mka recoveryimage

      - name: Package recovery image
        run: |
          cp $HOME/ofox-12.1/out/target/product/a54x/recovery.img $HOME/ofox-build/ofox.img
          cd $HOME/ofox-build
          magiskboot unpack ofox.img
          magiskboot repack recovery-${{ matrix.target }}.img recovery.img
          PACKAGE_NAME="OFOX-${{ matrix.target }}_${{ env.DATE }}.tar"
          tar cf "$PACKAGE_NAME" recovery.img
          cp OFOX* $HOME/files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/runner/files/OFOX*
          name: "OFOX Recovery - ${{ env.DATE }}"
          tag_name: "ofox-${{ env.DATE }}"
          body: |
            ### Features
            - Full touch interface
            - ADB support
            - MTP support
            - Decrypt data partition
            - Backup and restore
            - LichUI support
            
            ### Important Notes
            - **VBMeta Patched**: https://github.com/Vaz15k/proprietary_vendor_samsung_a54x/releases
            - Always backup your current recovery before flashing
            - Ensure you download the correct file for your device model
            ---
            <div align="center">
            <b>Special Thanks:</b><br>
            - <b>@Vaz15k</b> for device images and resources<br>
            - <b>@salvogiangri</b> for TWRP tree<br>
            - <b><a href="https://gitlab.com/OrangeFox">OrangeFox Team</a></b> for build scripts
            </div>
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify_completion:
    name: Notify Build Completion
    needs: [setup, build_twrp, build_pbrp, build_shrp, build_orangefox]
    runs-on: ubuntu-latest
    if: always() && (needs.build_twrp.result != 'cancelled' || needs.build_pbrp.result != 'cancelled' || needs.build_shrp.result != 'cancelled' || needs.build_orangefox.result != 'cancelled')
    steps:
      - name: Determine build results
        id: results
        run: |
          # Count successful builds
          success_count=0
          failed_count=0
          skipped_count=0
          total_builds=0
          
          # Check each recovery type that was supposed to build
          matrix="${{ needs.setup.outputs.matrix }}"
          
          if echo "$matrix" | grep -q "TWRP"; then
            total_builds=$((total_builds + 8))
            if [ "${{ needs.build_twrp.result }}" == "success" ]; then
              success_count=$((success_count + 8))
            elif [ "${{ needs.build_twrp.result }}" == "failure" ]; then
              failed_count=$((failed_count + 8))
            else
              skipped_count=$((skipped_count + 8))
            fi
          fi
          
          if echo "$matrix" | grep -q "PBRP"; then
            total_builds=$((total_builds + 8))
            if [ "${{ needs.build_pbrp.result }}" == "success" ]; then
              success_count=$((success_count + 8))
            elif [ "${{ needs.build_pbrp.result }}" == "failure" ]; then
              failed_count=$((failed_count + 8))
            else
              skipped_count=$((skipped_count + 8))
       
