name: Recovery Builder MAINTAINER (Stable + Matrix + Release)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        recovery: [twrp, shrp, orangefox]
        device: [a35x]

    env:
      USE_CCACHE: 1
      CCACHE_DIR: ${{ github.workspace }}/ccache
      CCACHE_EXEC: /usr/bin/ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 UBUNTU PROOF DEPENDENCIES
      - name: Install dependencies (MAINTAINER FIX)
        run: |
          sudo apt-get update

          sudo dpkg --add-architecture i386 || true

          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            gcc-multilib g++-multilib libc6-dev-i386 \
            libncurses-dev \
            libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig \
            ccache python3

      - name: Setup repo tool
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # 🔥 INIT SOURCE (RECOVERY SELECTOR)
      - name: Init recovery source
        run: |
          mkdir -p workspace
          cd workspace

          if [ "${{ matrix.recovery }}" = "twrp" ]; then
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          elif [ "${{ matrix.recovery }}" = "shrp" ]; then
            repo init -u https://github.com/SHRP-Reborn/manifest.git -b shrp-12.1
          else
            repo init -u https://gitlab.com/OrangeFox/sync.git -b fox_12.1
          fi

      - name: Sync source
        run: |
          cd workspace
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      # 🔥 DEVICE TREE
      - name: Clone device tree
        run: |
          cd workspace
          git clone https://github.com/christiandroid20/android_device_samsung_${{ matrix.device }}.git \
            device/${{ matrix.device }}

      # 🔥 CCACHE (MAINTAINER LEVEL)
      - name: Setup ccache
        run: |
          ccache -M 15G
          ccache -z

      # 🔥 BUILD FIXED (SOONG ONLY)
      - name: Build recovery (MAINTAINER FIX)
        run: |
          cd workspace

          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          export TW_DEFAULT_LANGUAGE=en
          export USE_CCACHE=1

          source build/envsetup.sh

          # 🔥 SAFE LUNCH SYSTEM
          if [ "${{ matrix.recovery }}" = "twrp" ]; then
            lunch twrp_${{ matrix.device }}-eng || lunch omni_${{ matrix.device }}-eng
          else
            lunch omni_${{ matrix.device }}-eng
          fi

          # 🔥 MAINTAINER FIX (NO MAKE DIRECT ERROR)
          build/soong/soong_ui.bash --make-mode recoveryimage -j$(nproc --all)

      # 🔥 COLLECT OUTPUT
      - name: Prepare artifacts
        run: |
          cd workspace

          mkdir -p release

          IMG=$(find out/target/product -name "*.img" | head -n 1)
          ZIP=$(find out/target/product -name "*.zip" | head -n 1)

          [ -f "$IMG" ] && cp "$IMG" release/
          [ -f "$ZIP" ] && cp "$ZIP" release/

          echo "BUILD_TAG=${{ matrix.recovery }}-${{ matrix.device }}-${{ github.run_id }}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.recovery }}-${{ matrix.device }}
          path: workspace/release/*

      # 🔥 AUTO RELEASE (MAINTAINER STYLE)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.recovery }}-${{ matrix.device }}-${{ github.run_id }}
          name: "Recovery ${{ matrix.recovery }} for ${{ matrix.device }}"
          body: |
            🚀 MAINTAINER BUILD

            - Recovery: ${{ matrix.recovery }}
            - Device: ${{ matrix.device }}
            - Run ID: ${{ github.run_id }}

            ⚠️ Auto-generated by GitHub Actions
          files: workspace/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
