name: Build Recoveries

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Select device model to build'
        required: false
        type: choice
        options:
          - 'All models'
          - 'SM-A356B'
          - 'SM-A356E'
          - 'SM-A356U'
        default: 'All models'
      products:
        description: 'Select products to build'
        required: false
        type: choice
        options:
          - 'All products'
          - 'TWRP'
          - 'SHRP'
          - 'OrangeFox'
        default: 'All products'
      clean_build:
        description: 'Clean build'
        required: false
        type: boolean
        default: false

env:
  DEVICE_TREE_URL: https://github.com/christiandroid20/android_device_samsung_a35x.git
  TWRP_MANIFEST: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  SHRP_MANIFEST: https://github.com/SHRP-Reborn/manifest.git
  ORANGEFOX_MANIFEST: https://gitlab.com/OrangeFox/sync.git

jobs:
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.products }}" == "All products" ]; then
            echo 'matrix=["TWRP", "SHRP", "OrangeFox"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.products }}"]' >> $GITHUB_OUTPUT
          fi

  notify_workflow:
    name: Notify Build Start
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F message_thread_id="${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}" \
            -F text="
            🚀 Build started for Recovery!
            📦 *Repository:* [${{ github.repository }}](https://github.com/${{ github.repository }})
            🗂️ *Products:* ${{ github.event.inputs.products }}
            🎯 *Target:* ${{ github.event.inputs.target }}
            ✏️ *Commit:* [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            [🔗 View GitHub Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            -F parse_mode="Markdown"

  build_twrp:
    name: Build TWRP
    needs: [setup, notify_workflow]
    runs-on: ubuntu-latest
    timeout-minutes: 480
    if: ${{ contains(needs.setup.outputs.matrix, 'TWRP') }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ github.event.inputs.target == 'All models' && fromJson('["SM-A356B", "SM-A356E", "SM-A356U"]') || fromJson(format('["{0}"]', github.event.inputs.target || 'SM-A356E')) }}

    steps:
      - name: Free up system space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Checkout device tree
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set build variables
        run: |
          echo "TARGET_DEVICE=${{ matrix.target }}" >> $GITHUB_ENV
          echo "RECOVERY_TYPE=TWRP" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl --retry 3 --retry-delay 5 -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git aria2 ccache
          git clone --depth=1 https://gitlab.com/OrangeFox/misc/scripts ~/scripts
          cd ~/scripts
          sudo bash setup/android_build_env.sh
          sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
          sudo bash setup/install_android_sdk.sh
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global color.ui true

      - name: Make directories
        run: |
          mkdir -p $HOME/twrp-12.1
          mkdir -p $HOME/twrp-build
          mkdir -p $HOME/files

      - name: Prepare device-specific files
        run: |
          curl --retry 3 --retry-delay 5 -o ~/bin/magiskboot https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Tools/magiskboot
          chmod +x ~/bin/magiskboot
          sudo ln -sf ~/bin/magiskboot /usr/bin/magiskboot
          curl --retry 5 --retry-delay 5 -o ~/twrp-build/recovery-${{ matrix.target }}.img https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Imagens/${{ matrix.target }}/recovery.img

      - name: Initialize TWRP source
        run: |
          cd $HOME/twrp-12.1
          repo init -u $TWRP_MANIFEST -b twrp-12.1 --depth=1

      - name: Sync TWRP source
        run: |
          cd $HOME/twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Clone device tree
        run: |
          cd $HOME/twrp-12.1
          git clone --depth=1 --branch android-14.1 ${{ env.DEVICE_TREE_URL }} device/samsung/a35x

      - name: Setup ccache
        if: github.event.inputs.clean_build != 'true'
        run: |
          cd $HOME/twrp-12.1
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 8G
          ccache -z

      - name: Build TWRP Recovery
        run: |
          cd $HOME/twrp-12.1
          export ALLOW_MISSING_DEPENDENCIES=true
          export TW_DEFAULT_LANGUAGE="en"
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make clean
          fi
          source build/envsetup.sh
          lunch twrp_a35x-eng
          mka recoveryimage -j$(nproc --all)

      - name: Package recovery image
        run: |
          cp $HOME/twrp-12.1/out/target/product/a35x/recovery.img $HOME/twrp-build/twrp.img
          cd $HOME/twrp-build
          magiskboot unpack twrp.img
          magiskboot repack recovery-${{ matrix.target }}.img recovery.img
          PACKAGE_NAME="TWRP-${{ matrix.target }}_${{ env.DATE }}.tar"
          tar cf "$PACKAGE_NAME" recovery.img
          cp TWRP* $HOME/files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/runner/files/TWRP*
          name: "TWRP Recovery - ${{ env.DATE }}"
          tag_name: "twrp-${{ env.DATE }}"
          body: |
            ### Features
            - Full touch interface
            - ADB support
            - MTP support
            - Decrypt data partition
            - Backup and restore
            - LichUI support

            ### Important Notes
            - Always backup your current recovery before flashing
            - Ensure you download the correct file for your device model
            ---
            <div align="center">
            <b>Special Thanks:</b><br>
            - <b>@Vaz15k</b> for device images and resources<br>
            - <b>@salvogiangri</b> for TWRP tree<br>
            - <b><a href="https://gitlab.com/OrangeFox">OrangeFox Team</a></b> for build scripts
            </div>
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_shrp:
    name: Build SHRP
    needs: [setup, notify_workflow]
    runs-on: ubuntu-latest
    timeout-minutes: 480
    if: ${{ contains(needs.setup.outputs.matrix, 'SHRP') }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ github.event.inputs.target == 'All models' && fromJson('["SM-A356B", "SM-A356E", "SM-A356U"]') || fromJson(format('["{0}"]', github.event.inputs.target || 'SM-A356E')) }}

    steps:
      - name: Free up system space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Checkout device tree
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set build variables
        run: |
          echo "TARGET_DEVICE=${{ matrix.target }}" >> $GITHUB_ENV
          echo "RECOVERY_TYPE=SHRP" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl --retry 3 --retry-delay 5 -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git aria2 ccache
          git clone --depth=1 https://gitlab.com/OrangeFox/misc/scripts ~/scripts
          cd ~/scripts
          sudo bash setup/android_build_env.sh
          sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
          sudo bash setup/install_android_sdk.sh
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global color.ui true

      - name: Install Python 2.7
        run: |
          set +e
          echo "Intentando instalar python2.7 vía PPA deadsnakes..."
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update -qq
          sudo apt-get install -y python2.7
          if command -v python2.7 >/dev/null 2>&1; then
            echo "python2.7 instalado correctamente vía PPA"
            exit 0
          fi

          echo "PPA falló, usando pyenv como respaldo..."
          curl https://pyenv.run | bash
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init - bash)"
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev wget curl llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev libffi-dev liblzma-dev
          pyenv install 2.7.18
          sudo ln -sf $HOME/.pyenv/versions/2.7.18/bin/python2.7 /usr/bin/python2.7

          if ! command -v python2.7 >/dev/null 2>&1; then
            echo "ERROR: no se pudo instalar python2.7 por ninguna vía"
            exit 1
          fi
          echo "python2.7 instalado correctamente vía pyenv"

      - name: Make directories
        run: |
          mkdir -p $HOME/shrp-12.1
          mkdir -p $HOME/shrp-build
          mkdir -p $HOME/files

      - name: Initialize SHRP source
        run: |
          cd $HOME/shrp-12.1
          repo init -u https://github.com/SHRP/manifest.git -b shrp-12.1 --depth=1

      - name: Sync SHRP source
        run: |
          cd $HOME/shrp-12.1
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Clone device tree
        run: |
          cd $HOME/shrp-12.1
          git clone --depth=1 --branch android-14.1 ${{ env.DEVICE_TREE_URL }} device/samsung/a35x

      - name: Setup ccache
        if: github.event.inputs.clean_build != 'true'
        run: |
          cd $HOME/shrp-12.1
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 8G
          ccache -z

      - name: Build SHRP Recovery
        run: |
          cd $HOME/shrp-12.1
          export ALLOW_MISSING_DEPENDENCIES=true
          export TW_DEFAULT_LANGUAGE="en"
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make clean
          fi
          source build/envsetup.sh
          lunch twrp_a35x-eng
          mka recoveryimage -j$(nproc --all)

      - name: Package recovery image
        run: |
          cd $HOME/shrp-12.1/out/target/product/a35x
          PACKAGE_NAME="SHRP-${{ matrix.target }}_${{ env.DATE }}.tar"
          tar cf "$PACKAGE_NAME" recovery.img
          cp "$PACKAGE_NAME" $HOME/files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/runner/files/SHRP*
          name: "SHRP Recovery - ${{ env.DATE }}"
          tag_name: "shrp-${{ env.DATE }}"
          body: |
            ### Features
            - Full touch interface
            - ADB support
            - MTP support
            - Decrypt data partition
            - Backup and restore

            ### Important Notes
            - Always backup your current recovery before flashing
            - Ensure you download the correct file for your device model
            ---
            <div align="center">
            <b>Special Thanks:</b><br>
            - <b>@salvogiangri</b> for TWRP tree<br>
            - <b><a href="https://gitlab.com/OrangeFox">OrangeFox Team</a></b> for build scripts
            </div>
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_orangefox:
    name: Build OrangeFox
    needs: [setup, notify_workflow]
    runs-on: ubuntu-latest
    timeout-minutes: 480
    if: ${{ contains(needs.setup.outputs.matrix, 'OrangeFox') }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ github.event.inputs.target == 'All models' && fromJson('["SM-A356B", "SM-A356E", "SM-A356U"]') || fromJson(format('["{0}"]', github.event.inputs.target || 'SM-A356E')) }}

    steps:
      - name: Free up system space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Checkout device tree
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Set build variables
        run: |
          echo "TARGET_DEVICE=${{ matrix.target }}" >> $GITHUB_ENV
          echo "RECOVERY_TYPE=OrangeFox" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl --retry 3 --retry-delay 5 -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git aria2 ccache
          git clone --depth=1 https://gitlab.com/OrangeFox/misc/scripts ~/scripts
          cd ~/scripts
          sudo bash setup/android_build_env.sh
          sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
          sudo bash setup/install_android_sdk.sh
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global color.ui true

      - name: Make directories
        run: |
          mkdir -p $HOME/ofox-12.1
          mkdir -p $HOME/ofox-build
          mkdir -p $HOME/files

      - name: Prepare device-specific files
        run: |
          curl --retry 3 --retry-delay 5 -o ~/bin/magiskboot https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Tools/magiskboot
          chmod +x ~/bin/magiskboot
          sudo ln -sf ~/bin/magiskboot /usr/bin/magiskboot
          curl --retry 5 --retry-delay 5 -o ~/ofox-build/recovery-${{ matrix.target }}.img https://raw.githubusercontent.com/Vaz15k/literate-potato/master/Imagens/${{ matrix.target }}/recovery.img

      - name: Initialize OrangeFox source
        run: |
          cd ~/scripts
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync

      - name: Sync OrangeFox source
        run: |
          cd $HOME/scripts/sync
          ./orangefox_sync.sh --branch 12.1 --path $HOME/ofox-12.1

      - name: Clone device tree
        run: |
          cd $HOME/ofox-12.1
          git clone --depth=1 --branch android-14.1 ${{ env.DEVICE_TREE_URL }} device/samsung/a35x

      - name: Setup ccache
        if: github.event.inputs.clean_build != 'true'
        run: |
          cd $HOME/ofox-12.1
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 8G
          ccache -z

      - name: Build OrangeFox Recovery
        run: |
          set +e
          cd $HOME/ofox-12.1
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_DEVICE=a35x
          export LC_ALL="C"
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make clean
          fi
          source build/envsetup.sh
          set -e
          lunch twrp_a35x-eng
          mka recoveryimage

      - name: Package recovery image
        run: |
          cp $HOME/ofox-12.1/out/target/product/a35x/recovery.img $HOME/ofox-build/ofox.img
          cd $HOME/ofox-build
          magiskboot unpack ofox.img
          magiskboot repack recovery-${{ matrix.target }}.img recovery.img
          PACKAGE_NAME="OFOX-${{ matrix.target }}_${{ env.DATE }}.tar"
          tar cf "$PACKAGE_NAME" recovery.img
          cp OFOX* $HOME/files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /home/runner/files/OFOX*
          name: "OFOX Recovery - ${{ env.DATE }}"
          tag_name: "ofox-${{ env.DATE }}"
          body: |
            ### Features
            - Full touch interface
            - ADB support
            - MTP support
            - Decrypt data partition
            - Backup and restore
            - LichUI support

            ### Important Notes
            - Always backup your current recovery before flashing
            - Ensure you download the correct file for your device model
            ---
            <div align="center">
            <b>Special Thanks:</b><br>
            - <b>@Vaz15k</b> for device images and resources<br>
            - <b>@salvogiangri</b> for TWRP tree<br>
            - <b><a href="https://gitlab.com/OrangeFox">OrangeFox Team</a></b> for build scripts
            </div>
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify_completion:
    name: Notify Build Completion
    needs: [setup, build_twrp, build_shrp, build_orangefox]
    runs-on: ubuntu-latest
    if: always() && (needs.build_twrp.result != 'cancelled' || needs.build_shrp.result != 'cancelled' || needs.build_orangefox.result != 'cancelled')
    steps:
      - name: Determine build results
        id: results
        run: |
          success_count=0
          failed_count=0
          skipped_count=0
          total_builds=0

          matrix="${{ needs.setup.outputs.matrix }}"

          if echo "$matrix" | grep -q "TWRP"; then
            total_builds=$((total_builds + 3))
            if [ "${{ needs.build_twrp.result }}" == "success" ]; then
              success_count=$((success_count + 3))
            elif [ "${{ needs.build_twrp.result }}" == "failure" ]; then
              failed_count=$((failed_count + 3))
            else
              skipped_count=$((skipped_count + 3))
            fi
          fi

          if echo "$matrix" | grep -q "SHRP"; then
            total_builds=$((total_builds + 3))
            if [ "${{ needs.build_shrp.result }}" == "success" ]; then
              success_count=$((success_count + 3))
            elif [ "${{ needs.build_shrp.result }}" == "failure" ]; then
              failed_count=$((failed_count + 3))
            else
              skipped_count=$((skipped_count + 3))
            fi
          fi

          if echo "$matrix" | grep -q "OrangeFox"; then
            total_builds=$((total_builds + 3))
            if [ "${{ needs.build_orangefox.result }}" == "success" ]; then
              success_count=$((success_count + 3))
            elif [ "${{ needs.build_orangefox.result }}" == "failure" ]; then
              failed_count=$((failed_count + 3))
            else
              skipped_count=$((skipped_count + 3))
            fi
          fi

          echo "success_count=$success_count" >> $GITHUB_OUTPUT
          echo "failed_count=$failed_count" >> $GITHUB_OUTPUT
          echo "skipped_count=$skipped_count" >> $GITHUB_OUTPUT
          echo "total_builds=$total_builds" >> $GITHUB_OUTPUT

      - name: Send Telegram Notification
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F message_thread_id="${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}" \
            -F text="
            ✅ Build completed!
            📦 *Repository:* [${{ github.repository }}](https://github.com/${{ github.repository }})
            🗂️ *Products:* ${{ github.event.inputs.products }}
            🎯 *Target:* ${{ github.event.inputs.target }}
            ✔️ *Success:* ${{ steps.results.outputs.success_count }}/${{ steps.results.outputs.total_builds }}
            ❌ *Failed:* ${{ steps.results.outputs.failed_count }}
            ⏭️ *Skipped:* ${{ steps.results.outputs.skipped_count }}
            [🔗 View GitHub Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            -F parse_mode="Markdown"
