name: SHRP A35x Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "SHRP Branch"
        required: true
        default: "shrp-12.1"
        type: choice
        options:
          - shrp-12.1
          - shrp-9.0

      DEVICE_TREE:
        description: "Device Tree Repo"
        required: true
        default: "https://github.com/lazycodebuilder/recovery_rmx1851"

      DEVICE_TREE_BRANCH:
        description: "Device Tree Branch"
        required: true
        default: "android-14_shrp"

      BUILD_TARGET:
        description: "Build Target"
        required: true
        default: "recovery"
        type: choice
        options:
          - recovery
          - boot
          - vendor_boot

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    env:
      DEVICE_MAKEFILE: omni_a35x
      DEVICE_NAME: a35x
      ALLOW_MISSING_DEPENDENCIES: true

      FOX_TARGET_DEVICES: a35x
      FOX_BUILD_DEVICE: a35x
      FOX_BUILD_TYPE: Beta

    steps:

    # 📦 Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # ☕ Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 8

    # ⚙️ Dependencias
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl bc bison build-essential zip unzip flex gperf python3 ccache libncurses5-dev

    # 🧰 repo tool
    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    # ⚡ ccache
    - name: Setup ccache
      run: |
        ccache -M 10G
        ccache -z

    # 📂 Init repo (usa tu input)
    - name: Init repo
      run: |
        mkdir android-recovery && cd android-recovery
        repo init -u https://github.com/SHRP-Reborn/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1

    # 🚀 Sync optimizado
    - name: Sync repo
      run: |
        cd android-recovery
        echo "👉 Sync started..."
        date
        repo sync -c -j4 --force-sync --no-tags --optimized-fetch
        echo "👉 Sync finished..."
        date

    # 🔧 Fix vendor/shrp
    - name: Fix vendor shrp
      run: |
        cd android-recovery
        if [ ! -d "vendor/shrp" ]; then
          git clone https://github.com/SHRP-Reborn/android_vendor_shrp vendor/shrp
        fi

    # 📱 Device tree dinámico
    - name: Clone device tree
      run: |
        cd android-recovery
        git clone --depth=1 ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} device/samsung/a35x

    # ⚙️ Build
    - name: Build SHRP
      run: |
        cd android-recovery

        export CCACHE_DIR=$HOME/.ccache

        source build/envsetup.sh

        echo "👉 Lunching: $DEVICE_MAKEFILE-eng"
        lunch $DEVICE_MAKEFILE-eng || exit 1

        mka clean
        mka ${{ inputs.BUILD_TARGET }}image -j4

    # 📦 Release
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.run_id }}
        name: SHRP A35x ${{ inputs.BUILD_TARGET }}
        files: |
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.img
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
