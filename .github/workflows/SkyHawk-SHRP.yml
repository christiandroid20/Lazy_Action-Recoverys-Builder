name: SkyHawk Recovery Project [SHRP]

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "SHRP Branch"
        required: true
        default: "shrp-12.1"
        type: choice
        options:
          - shrp-12.1
          - shrp-9.0

      DEVICE_TREE:
        description: "Device Tree Repo"
        required: true
        default: "https://github.com/christiandroid20/android_device_samsung_a35x"

      DEVICE_TREE_BRANCH:
        description: "Device Tree Branch"
        required: true
        default: "android-12.1"

      BUILD_TARGET:
        description: "Build Target"
        required: true
        default: "recovery"
        type: choice
        options:
          - recovery
          - boot
          - vendor_boot

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: echo "workflow working"
