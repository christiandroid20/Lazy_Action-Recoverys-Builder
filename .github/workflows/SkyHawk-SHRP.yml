name: SkyHawk Recovery Project [SHRP]

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "SHRP Branch"
        required: true
        default: "shrp-12.1"

      DEVICE_TREE:
        description: "Device Tree Repo"
        required: true
        default: "https://github.com/christiandroid20/android_device_samsung_a35x"

      DEVICE_TREE_BRANCH:
        description: "Device Tree Branch"
        required: true
        default: "android-12.1"

      BUILD_TARGET:
        description: "Build Target"
        required: true
        default: "recovery"

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEVICE_MAKEFILE: omni_a35x
      DEVICE_NAME: a35x
      ALLOW_MISSING_DEPENDENCIES: true
      USE_CCACHE: 1

    steps:

    - name: Free space
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
        sudo apt clean
        sudo rm -rf /var/lib/apt/lists/*
        df -h

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl bc bison build-essential zip unzip flex gperf \
          python3 ccache libncurses5-dev libssl-dev rsync repo

    - name: Setup repo
      run: |
        mkdir android-recovery && cd android-recovery
        repo init -u https://github.com/SHRP-Reborn/manifest.git \
          -b ${{ github.event.inputs.MANIFEST_BRANCH }} --depth=1

    - name: Sync repo (safe)
      run: |
        cd android-recovery
        repo sync -c --no-tags --no-clone-bundle --force-sync -j2

    - name: Fix vendor
      run: |
        cd android-recovery
        [ -d vendor/shrp ] || git clone https://github.com/SHRP-Reborn/android_vendor_shrp vendor/shrp

    - name: Clone device tree
      run: |
        cd android-recovery
        git clone --depth=1 ${{ github.event.inputs.DEVICE_TREE }} \
          -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} device/samsung/a35x

    - name: Build environment
      run: |
        cd android-recovery
        source build/envsetup.sh
        lunch omni_a35x-eng

    - name: Build recovery
      run: |
        cd android-recovery
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C

        mka recoveryimage -j2

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SHRP-A35X
        path: android-recovery/out/target/product/*/recovery.img

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.run_id }}
        files: android-recovery/out/target/product/*/recovery.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
