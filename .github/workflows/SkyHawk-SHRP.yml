name: SHRP A35x Clean Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    env:
      DEVICE_MAKEFILE: omni_a35x
      DEVICE_NAME: a35x
      ALLOW_MISSING_DEPENDENCIES: true

      # Fix OrangeFox conflicts
      FOX_TARGET_DEVICES: a35x
      FOX_BUILD_DEVICE: a35x
      FOX_BUILD_TYPE: Beta

    steps:

    # 📦 1. Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # ☕ 2. Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 8

    # ⚙️ 3. Dependencias mínimas
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl bc bison build-essential zip unzip flex gperf python3 ccache libncurses5-dev

    # 🧰 4. Repo tool
    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    # ⚡ 5. ccache (velocidad)
    - name: Setup ccache
      run: |
        ccache -M 10G
        ccache -z

    # 📂 6. Init repo SHRP
    - name: Init repo
      run: |
        mkdir android-recovery && cd android-recovery
        repo init -u https://github.com/SHRP-Reborn/manifest.git -b shrp-12.1 --depth=1

    # 🔄 7. Sync optimizado
    - name: Sync repo
      run: |
        cd android-recovery
        repo sync -c --force-sync --no-tags --no-clone-bundle --optimized-fetch -j2

    # 🔧 8. Fix vendor/shrp (por si falla el manifest)
    - name: Fix vendor shrp
      run: |
        cd android-recovery
        if [ ! -d "vendor/shrp" ]; then
          git clone https://github.com/SHRP-Reborn/android_vendor_shrp vendor/shrp
        fi

    # 📱 9. Clonar tu device tree
    - name: Clone device tree
      run: |
        cd android-recovery
        git clone --depth=1 https://github.com/lazycodebuilder/recovery_rmx1851 device/samsung/a35x

    # ⚙️ 10. Build limpio
    - name: Build SHRP
      run: |
        cd android-recovery

        export CCACHE_DIR=$HOME/.ccache

        source build/envsetup.sh

        echo "👉 Lunching: $DEVICE_MAKEFILE-eng"

        lunch $DEVICE_MAKEFILE-eng || exit 1

        mka clean
        mka recoveryimage -j2

    # 📦 11. Subir resultado
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.run_id }}
        name: SHRP A35x Build
        files: |
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.img
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
