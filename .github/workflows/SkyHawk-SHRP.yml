name: SkyHawk [SHRP]

on:
  workflow_dispatch:
    inputs:
      MANIFEST:
        description: 'SHRP Manifest'
        required: true
        default: 'https://github.com/SHRP-Reborn/manifest.git'

      MANIFEST_BRANCH:
        description: 'SHRP Manifest Branch'
        required: true
        type: choice
        options:
          - shrp-12.1
          - shrp-9.0

      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/lazycodebuilder/recovery_rmx1851'

      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'android-14_shrp'

      BUILD_TARGET:
        description: 'Build Target'
        required: true
        type: choice
        options:
          - boot
          - recovery
          - vendor_boot

      LDCHECK:
        description: 'Use LDCHECK'
        required: false
        default: false
        type: boolean

      LDCHECKPATH:
        description: 'Blob path'
        required: true
        default: 'system/bin/qseecomd'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    env:
      ALLOW_MISSING_DEPENDENCIES: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 8

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl python3 bc bison build-essential zip unzip flex gperf libncurses5-dev

    - name: Install repo tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Init repo
      run: |
        mkdir android-recovery && cd android-recovery
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        repo init -u ${{ inputs.MANIFEST }} -b ${{ inputs.MANIFEST_BRANCH }} --depth=1

    - name: Sync repo
      run: |
        cd android-recovery
        repo sync -c --force-sync --no-tags --no-clone-bundle -j$(nproc)

    - name: Clone device tree
      run: |
        cd android-recovery
        git clone --depth=1 ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} device_tree

    - name: Detect device config
      run: |
        cd android-recovery/device_tree

        MK=$(ls *.mk 2>/dev/null | head -n 1)

        if [ -z "$MK" ]; then
          echo "No .mk file found!" && exit 1
        fi

        MAKEFILE=$(grep -m1 "PRODUCT_NAME" $MK | cut -d ':' -f2 | tr -d ' ')
        BRAND=$(grep -m1 "PRODUCT_BRAND" $MK | cut -d ':' -f2 | tr -d ' ')
        CODENAME=$(grep -m1 "PRODUCT_DEVICE" $MK | cut -d ':' -f2 | tr -d ' ')

        echo "DEVICE_MAKEFILE=$MAKEFILE" >> $GITHUB_ENV
        echo "DEVICE_NAME=$CODENAME" >> $GITHUB_ENV
        echo "DEVICE_DIR=device/$BRAND/$CODENAME" >> $GITHUB_ENV

    - name: Move tree
      run: |
        cd android-recovery
        mkdir -p $DEVICE_DIR
        mv device_tree $DEVICE_DIR/

    - name: Build SHRP
      run: |
        cd android-recovery
        source build/envsetup.sh

        lunch $DEVICE_MAKEFILE-eng || exit 1

        mka clean
        mka ${{ inputs.BUILD_TARGET }}image -j$(nproc)

    - name: Build info
      run: echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.run_id }}
        name: SHRP ${{ env.DEVICE_NAME }} ${{ env.BUILD_DATE }}
        files: |
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.img
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
