name: SkyHawk Recovery Project [SHRP]

on:

  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "SHRP Branch"
        required: true
        default: "shrp-12.1"
        type: choice
        options:
          - shrp-12.1
          - shrp-9.0
```
  DEVICE_TREE:
    description: "Device Tree Repo"
    required: true
    default: "https://github.com/christiandroid20/android_device_samsung_a35x"

  DEVICE_TREE_BRANCH:
    description: "Device Tree Branch"
    required: true
    default: "android-12.1"

  BUILD_TARGET:
    description: "Build Target"
    required: true
    default: "recovery"
    type: choice
    options:
      - recovery
      - boot
      - vendor_boot
```

jobs:
build:
runs-on: ubuntu-22.04

```
permissions:
  contents: write

env:
  DEVICE_MAKEFILE: omni_a35x
  DEVICE_NAME: a35x
  ALLOW_MISSING_DEPENDENCIES: true

  FOX_TARGET_DEVICES: a35x
  FOX_BUILD_DEVICE: a35x
  FOX_BUILD_TYPE: Release

  SHRP_BUILD_TYPE: Release

steps:

- name: Checkout
  uses: actions/checkout@v4

- name: Free Disk Space
  run: |
    sudo rm -rf /usr/share/dotnet
    sudo rm -rf /opt/ghc
    sudo rm -rf /usr/local/lib/android
    sudo rm -rf /opt/hostedtoolcache

    docker system prune -af || true

    echo "==== FREE SPACE ===="
    df -h

- name: Setup Java
  uses: actions/setup-java@v4
  with:
    distribution: zulu
    java-version: 8

- name: Install deps
  run: |
    sudo apt update
    sudo apt install -y \
      git curl bc bison build-essential \
      zip unzip flex gperf python3 \
      ccache libncurses5-dev libssl-dev

- name: Install repo
  run: |
    mkdir -p ~/bin
    curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    chmod +x ~/bin/repo
    echo "$HOME/bin" >> $GITHUB_PATH

- name: Setup ccache
  run: |
    export USE_CCACHE=1
    ccache -M 5G
    ccache -z

- name: Init repo
  run: |
    mkdir -p android-recovery
    cd android-recovery

    repo init \
      -u https://github.com/SHRP-Reborn/manifest.git \
      -b ${{ inputs.MANIFEST_BRANCH }} \
      --depth=1

- name: Sync repo
  run: |
    cd android-recovery

    repo sync \
      -c \
      --force-sync \
      --no-tags \
      --no-clone-bundle \
      --optimized-fetch \
      -j4

- name: Check disk after sync
  run: |
    cd android-recovery

    echo "==== DISK USAGE ===="
    df -h

    echo "==== REPO SIZE ===="
    du -sh .repo || true

    echo "==== TREE SIZE ===="
    du -sh . || true

- name: Fix vendor shrp
  run: |
    cd android-recovery

    if [ ! -d vendor/shrp ]; then
      git clone --depth=1 \
        https://github.com/SHRP-Reborn/android_vendor_shrp \
        vendor/shrp
    fi

- name: Clone device tree
  run: |
    cd android-recovery

    git clone \
      --depth=1 \
      -b ${{ inputs.DEVICE_TREE_BRANCH }} \
      ${{ inputs.DEVICE_TREE }} \
      device/samsung/a35x

- name: Fix Pre-Release bug (SHRP)
  run: |
    cd android-recovery

    grep -R "Pre-Release" vendor/shrp || true

    find vendor/shrp \
      -type f \
      -exec sed -i 's/Pre-Release/Release/g' {} + || true

- name: Check disk before build
  run: |
    cd android-recovery
    df -h

- name: Build SHRP
  run: |
    cd android-recovery

    export USE_CCACHE=1
    export CCACHE_DIR=$HOME/.ccache
    export ALLOW_MISSING_DEPENDENCIES=true
    export SHRP_BUILD_TYPE=Release

    source build/envsetup.sh

    lunch $DEVICE_MAKEFILE-eng

    mka ${{ inputs.BUILD_TARGET }}image -j4

- name: Show output
  run: |
    cd android-recovery

    find out/target/product/${{ env.DEVICE_NAME }} \
      -name "*.img" \
      -o -name "*.zip"

- name: Release
  uses: softprops/action-gh-release@v2
  with:
    tag_name: ${{ github.run_id }}
    name: SHRP A35x ${{ inputs.BUILD_TARGET }}
    files: |
      android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.img
      android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.zip
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
