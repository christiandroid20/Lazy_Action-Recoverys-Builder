name: SkyHawk SHRP Reborn Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "SHRP Reborn Branch"
        required: true
        default: "shrp-12.1"
        type: choice
        options:
          - shrp-12.1
          - shrp-9.0

      DEVICE_TREE:
        description: "Device Tree Repo"
        required: true
        default: https://github.com/christiandroid20/android_device_samsung_a54x/tree/shrp-12.1

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEVICE_MAKEFILE: omni_a35x
      DEVICE_NAME: a35x
      ALLOW_MISSING_DEPENDENCIES: true
      USE_CCACHE: 1
      CCACHE_EXEC: /usr/bin/ccache

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl python3 ccache bc bison build-essential \
          flex g++-multilib gcc-multilib libxml2-utils make \
          openjdk-11-jdk zip unzip rsync

      - name: Setup repo (FIXED - latest version)
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init SHRP Reborn
        run: |
          mkdir android-recovery
          cd android-recovery

          repo init -u https://github.com/SHRP-Reborn/manifest.git -b ${{ inputs.MANIFEST_BRANCH }}

      - name: Sync source (OPTIMIZED)
        run: |
          cd android-recovery

          repo sync -c \
            --no-tags \
            --no-clone-bundle \
            --optimized-fetch \
            --prune \
            -j8

      - name: Setup ccache
        run: |
          export USE_CCACHE=1
          ccache -M 10G
          ccache -o compression=true

      - name: Clone device tree
        run: |
          cd android-recovery
          git clone ${{ inputs.DEVICE_TREE }} device/samsung/a35x

      - name: Build recovery
        run: |
          cd android-recovery
          source build/envsetup.sh
          lunch $DEVICE_MAKEFILE-eng
          mka recoveryimage -j8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SHRP-Reborn-a35x
          path: android-recovery/out/target/product/a35x/*.img
